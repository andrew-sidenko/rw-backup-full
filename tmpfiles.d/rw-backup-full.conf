# rw-backup-full: каталоги, которые должны существовать после каждой
# загрузки, независимо от порядка старта юнитов и от того, установлен ли
# node_exporter на этом сервере. systemd-tmpfiles-setup.service выполняется
# рано при загрузке — это более надёжная гарантия, чем ExecStartPre
# отдельных юнитов (тот тоже оставлен как резервный уровень защиты).
d /var/lib/node_exporter/textfile_collector 0755 root root -
d /var/lib/rw-wal 0755 root root -
